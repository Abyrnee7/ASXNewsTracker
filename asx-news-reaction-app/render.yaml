services:
  - type: web
    name: asx-news-reaction-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SCHEDULER_ENABLED
        value: true
      - key: WATCHLIST
        value: BHP,CBA,JBH,WDS,FMG,CSL
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
