services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    command: bash -lc "pip install -r requirements.txt && python run.py"
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./asx_reactions.db
      - WATCHLIST=BHP,CBA,JBH,WDS
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    command: bash -lc "npm install && npm run dev"
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
